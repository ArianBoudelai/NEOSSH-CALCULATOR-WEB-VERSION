<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NEO//CALC — Cyberpunk Calculator</title>
<style>
  :root {
    --bg: #05010f;
    --panel: #0c0820;
    --cyan: #00f0ff;
    --magenta: #ff2bd6;
    --yellow: #f9f871;
    --green: #00ff9c;
    --text: #d6f7ff;
    --dim: #5a7a8a;
    --glow-cyan: 0 0 6px #00f0ff, 0 0 14px rgba(0,240,255,.55);
    --glow-mag: 0 0 6px #ff2bd6, 0 0 14px rgba(255,43,214,.55);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    font-family: 'Courier New', ui-monospace, monospace;
    color: var(--text);
    overflow: hidden;
  }

  /* Animated grid backdrop */
  body::before {
    content: "";
    position: fixed; inset: 0;
    background:
      linear-gradient(rgba(0,240,255,.06) 1px, transparent 1px) 0 0 / 100% 38px,
      linear-gradient(90deg, rgba(255,43,214,.05) 1px, transparent 1px) 0 0 / 38px 100%,
      radial-gradient(circle at 50% 120%, rgba(0,240,255,.12), transparent 60%);
    animation: drift 18s linear infinite;
    pointer-events: none;
  }
  @keyframes drift { to { background-position: 0 38px, 38px 0, 0 0; } }

  /* Scanline sweep */
  body::after {
    content: "";
    position: fixed; inset: 0;
    background: repeating-linear-gradient(transparent 0 2px, rgba(0,0,0,.18) 2px 4px);
    pointer-events: none;
    mix-blend-mode: overlay;
  }

  .stage {
    height: 100%;
    display: grid;
    place-items: center;
    padding: 16px;
    position: relative;
    z-index: 1;
  }

  .calc {
    width: min(380px, 94vw);
    background: linear-gradient(160deg, #0e0a26, #070418);
    border: 1px solid rgba(0,240,255,.35);
    border-radius: 18px;
    padding: 22px;
    box-shadow:
      0 0 0 1px rgba(255,43,214,.18) inset,
      0 0 30px rgba(0,240,255,.18),
      0 0 80px rgba(255,43,214,.10),
      0 24px 60px rgba(0,0,0,.7);
    position: relative;
  }

  .brand {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 12px; letter-spacing: 3px;
    margin-bottom: 14px; text-transform: uppercase;
  }
  .brand .name { color: var(--cyan); text-shadow: var(--glow-cyan); }
  .brand .dot { color: var(--magenta); text-shadow: var(--glow-mag); animation: blink 1.4s steps(2) infinite; }
  @keyframes blink { 50% { opacity: .25; } }

  .screen {
    background: #02040a;
    border: 1px solid rgba(0,240,255,.25);
    border-radius: 12px;
    padding: 14px 16px;
    text-align: right;
    margin-bottom: 18px;
    overflow: hidden;
    box-shadow: inset 0 0 24px rgba(0,240,255,.10);
  }
  .history {
    min-height: 18px;
    font-size: 14px;
    color: var(--dim);
    letter-spacing: 1px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    direction: rtl;
  }
  .display {
    font-size: 40px;
    color: var(--green);
    text-shadow: 0 0 8px rgba(0,255,156,.7);
    line-height: 1.15;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    direction: rtl;
  }
  .display.error { color: var(--magenta); text-shadow: var(--glow-mag); }

  .pad { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }

  button {
    font-family: inherit;
    font-size: 19px;
    font-weight: 700;
    color: var(--text);
    background: linear-gradient(180deg, #15102e, #0b0820);
    border: 1px solid rgba(0,240,255,.20);
    border-radius: 12px;
    padding: 16px 0;
    cursor: pointer;
    transition: transform .05s, box-shadow .15s, border-color .15s, color .15s;
    user-select: none;
  }
  button:hover { border-color: var(--cyan); color: var(--cyan); box-shadow: var(--glow-cyan); }
  button:active { transform: translateY(2px) scale(.97); }
  button.flash { animation: flash .18s; }
  @keyframes flash { 50% { background: #1d1640; box-shadow: var(--glow-cyan); } }

  .op { color: var(--magenta); }
  .op:hover { border-color: var(--magenta); color: var(--magenta); box-shadow: var(--glow-mag); }
  .fn { color: var(--yellow); font-size: 16px; }
  .fn:hover { border-color: var(--yellow); color: var(--yellow); box-shadow: 0 0 6px #f9f871, 0 0 14px rgba(249,248,113,.5); }
  .equals {
    grid-column: span 2;
    background: linear-gradient(180deg, #00f0ff22, #ff2bd622);
    color: #fff;
    border-color: rgba(255,43,214,.5);
  }
  .equals:hover { box-shadow: var(--glow-mag), var(--glow-cyan); color:#fff; }

  .foot {
    margin-top: 14px; text-align: center;
    font-size: 10px; letter-spacing: 2px; color: var(--dim);
    text-transform: uppercase;
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="calc">
      <div class="brand">
        <span class="name">NEO//CALC</span>
        <span class="dot">● ONLINE</span>
      </div>

      <div class="screen">
        <div class="history" id="history"></div>
        <div class="display" id="display">0</div>
      </div>

      <div class="pad" id="pad">
        <button class="fn" data-action="clear">AC</button>
        <button class="fn" data-action="sign">±</button>
        <button class="fn" data-action="percent">%</button>
        <button class="op" data-op="/">÷</button>

        <button data-num="7">7</button>
        <button data-num="8">8</button>
        <button data-num="9">9</button>
        <button class="op" data-op="*">×</button>

        <button data-num="4">4</button>
        <button data-num="5">5</button>
        <button data-num="6">6</button>
        <button class="op" data-op="-">−</button>

        <button data-num="1">1</button>
        <button data-num="2">2</button>
        <button data-num="3">3</button>
        <button class="op" data-op="+">+</button>

        <button data-num="0">0</button>
        <button data-num=".">.</button>
        <button class="equals" data-action="equals">=</button>
      </div>

      <div class="foot">SYS.2077 // KEYBOARD READY</div>
    </div>
  </div>

<script>
(function () {
  const displayEl = document.getElementById('display');
  const historyEl = document.getElementById('history');
  const pad = document.getElementById('pad');

  let current = '0';     // string being typed
  let stored = null;     // previous operand (number)
  let op = null;         // pending operator
  let justEvaluated = false;

  const OPS = { '+': '+', '-': '−', '*': '×', '/': '÷' };

  function fmt(nStr) {
    if (nStr === '' || nStr === '-') return nStr || '0';
    const n = Number(nStr);
    if (!isFinite(n)) return nStr;
    // Keep what the user typed if it's a plain in-progress entry
    if (/[.]$|\.\d*0$/.test(nStr) && nStr.length < 16) return nStr;
    const rounded = Math.round((n + Number.EPSILON) * 1e10) / 1e10;
    return String(rounded);
  }

  function render(err) {
    displayEl.textContent = err ? err : fmt(current);
    displayEl.classList.toggle('error', !!err);
    historyEl.textContent = stored !== null && op
      ? `${trimNum(stored)} ${OPS[op]}`
      : '';
  }

  function trimNum(n) {
    return String(Math.round((n + Number.EPSILON) * 1e10) / 1e10);
  }

  function inputNum(d) {
    if (justEvaluated) { current = '0'; justEvaluated = false; }
    if (d === '.') {
      if (current.includes('.')) return;
      current = current === '' ? '0.' : current + '.';
    } else {
      current = (current === '0') ? d : current + d;
    }
    render();
  }

  function setOp(nextOp) {
    if (op && !justEvaluated && stored !== null) {
      compute();
    } else {
      stored = Number(current);
    }
    op = nextOp;
    justEvaluated = false;
    current = '0';
    render();
  }

  function compute() {
    if (op === null || stored === null) return;
    const a = stored, b = Number(current);
    let r;
    switch (op) {
      case '+': r = a + b; break;
      case '-': r = a - b; break;
      case '*': r = a * b; break;
      case '/':
        if (b === 0) { error('DIV/0 :: NULL'); return; }
        r = a / b; break;
    }
    current = String(r);
    stored = r;
  }

  function equals() {
    if (op === null) return;
    const a = trimNum(stored), b = trimNum(Number(current)), symbol = OPS[op];
    compute();
    if (displayEl.classList.contains('error')) return;
    historyEl.textContent = `${a} ${symbol} ${b} =`;
    op = null; stored = null; justEvaluated = true;
    displayEl.textContent = fmt(current);
    displayEl.classList.remove('error');
  }

  function error(msg) {
    render(msg);
    current = '0'; stored = null; op = null; justEvaluated = true;
  }

  function clearAll() {
    current = '0'; stored = null; op = null; justEvaluated = false;
    render();
  }

  function sign() {
    if (current === '0' || current === '') return;
    current = current.startsWith('-') ? current.slice(1) : '-' + current;
    render();
  }

  function percent() {
    current = String(Number(current) / 100);
    render();
  }

  function flash(el) {
    if (!el) return;
    el.classList.remove('flash'); void el.offsetWidth; el.classList.add('flash');
  }

  pad.addEventListener('click', e => {
    const b = e.target.closest('button');
    if (!b) return;
    flash(b);
    if (b.dataset.num !== undefined) inputNum(b.dataset.num);
    else if (b.dataset.op) setOp(b.dataset.op);
    else if (b.dataset.action === 'equals') equals();
    else if (b.dataset.action === 'clear') clearAll();
    else if (b.dataset.action === 'sign') sign();
    else if (b.dataset.action === 'percent') percent();
  });

  // Keyboard support
  const keyMap = {
    '/': '[data-op="/"]', '*': '[data-op="*"]',
    '-': '[data-op="-"]', '+': '[data-op="+"]',
    '=': '[data-action="equals"]', 'Enter': '[data-action="equals"]',
    'Escape': '[data-action="clear"]', '%': '[data-action="percent"]',
    '.': '[data-num="."]'
  };

  window.addEventListener('keydown', e => {
    let sel = null;
    if (/\d/.test(e.key)) sel = `[data-num="${e.key}"]`;
    else if (keyMap[e.key]) sel = keyMap[e.key];
    else if (e.key === 'Backspace') {
      current = current.length > 1 ? current.slice(0, -1) : '0';
      if (justEvaluated) { current = '0'; justEvaluated = false; }
      render(); return;
    }
    if (!sel) return;
    e.preventDefault();
    const btn = pad.querySelector(sel);
    flash(btn);
    btn.click ? null : null;
    // dispatch the same logic
    if (btn.dataset.num !== undefined) inputNum(btn.dataset.num);
    else if (btn.dataset.op) setOp(btn.dataset.op);
    else if (btn.dataset.action === 'equals') equals();
    else if (btn.dataset.action === 'clear') clearAll();
    else if (btn.dataset.action === 'percent') percent();
  });

  render();
})();
</script>
</body>
</html>
